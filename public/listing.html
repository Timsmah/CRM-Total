<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tim THLD · Property Listing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px 14px;
      border-bottom: 1px solid #1e1e1e;
    }
    .header-agent { display: flex; align-items: center; gap: 12px; }
    .header-photo {
      width: 42px; height: 42px; border-radius: 50%;
      object-fit: cover; border: 2px solid #d4a843;
    }
    .header-photo-placeholder {
      width: 42px; height: 42px; border-radius: 50%;
      background: #d4a843; color: #111; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; border: 2px solid #d4a843;
    }
    .brand { font-size: 17px; font-weight: 800; letter-spacing: 1.5px; color: #fff; }
    .brand span { color: #d4a843; }
    .brand-sub { font-size: 11px; color: #666; font-weight: 400; letter-spacing: 0.5px; margin-top: 1px; }

    /* ── Carousel ── */
    .carousel-section {
      position: relative;
      width: 100%;
      max-width: 860px;
      margin: 24px auto 0;
      padding: 0 24px;
    }
    .carousel-track {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      max-height: 460px;
      background: #1a1a1a;
      border-radius: 16px;
      overflow: hidden;
    }
    .carousel-track img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      background: #1a1a1a;
    }
    .car-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; width: 40px; height: 40px; border-radius: 50%;
      font-size: 20px; cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; backdrop-filter: blur(4px);
    }
    .car-btn:hover { background: rgba(0,0,0,0.85); }
    .car-prev { left: 10px; }
    .car-next { right: 10px; }
    .car-count {
      position: absolute; bottom: 12px; right: 14px;
      background: rgba(0,0,0,0.65); color: #fff;
      font-size: 12px; padding: 3px 10px; border-radius: 20px;
      backdrop-filter: blur(4px);
    }
    .car-thumbs {
      display: flex; gap: 8px; margin-top: 10px;
      overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none;
    }
    .car-thumbs::-webkit-scrollbar { display: none; }
    .thumb {
      flex-shrink: 0; width: 56px; height: 42px;
      border-radius: 6px; overflow: hidden; cursor: pointer;
      opacity: 0.5; transition: opacity 0.15s; border: 2px solid transparent;
    }
    .thumb.active { opacity: 1; border-color: #d4a843; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .no-photo {
      display: flex; align-items: center; justify-content: center;
      height: 100%; font-size: 64px; opacity: 0.2;
    }

    /* ── Content ── */
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 24px 120px;
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; padding: 4px 12px;
      border-radius: 20px; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .status-available { background: rgba(34,197,94,0.12); color: #22c55e; }
    .status-proposed  { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .status-rented    { background: rgba(239,68,68,0.12);  color: #ef4444; }

    .prop-title {
      font-size: 28px; font-weight: 800; line-height: 1.15;
      margin-bottom: 6px; color: #fff;
    }
    .prop-price {
      font-size: 24px; font-weight: 700; color: #d4a843; margin-bottom: 28px;
    }

    .divider { height: 1px; background: #222; margin: 22px 0; }

    .details-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .detail-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-label {
      font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600;
    }
    .detail-value { font-size: 15px; color: #ddd; font-weight: 500; }

    .description {
      margin-top: 22px; font-size: 14px; line-height: 1.75;
      color: #999; white-space: pre-line;
    }

    /* ── Agent card ── */
    .agent-card {
      margin-top: 32px;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 14px;
      padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .agent-photo {
      width: 56px; height: 56px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      border: 2px solid #d4a843;
    }
    .agent-photo-placeholder {
      width: 56px; height: 56px; border-radius: 50%;
      background: #d4a843; display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: #111; flex-shrink: 0;
    }
    .agent-info { flex: 1; }
    .agent-name { font-size: 16px; font-weight: 700; color: #fff; }
    .agent-title { font-size: 12px; color: #666; margin-top: 2px; }

    /* ── CTA ── */
    .cta-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 24px 20px;
      background: linear-gradient(to top, #111 60%, transparent 100%);
    }
    .cta-inner {
      max-width: 860px; margin: 0 auto;
    }
    .btn-whatsapp {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #25d366; color: #fff; border: none; border-radius: 14px;
      padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer;
      text-decoration: none; transition: opacity 0.15s; letter-spacing: 0.3px;
    }
    .btn-whatsapp:hover { opacity: 0.92; }

    /* ── States ── */
    .loading, .error-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 80vh; gap: 14px; color: #555;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #222;
      border-top-color: #d4a843; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .carousel-section { padding: 0 14px; }
      .carousel-track { aspect-ratio: 1/1; max-height: 340px; }
      .content { padding: 20px 14px 110px; }
      .prop-title { font-size: 22px; }
      .details-grid { grid-template-columns: 1fr; gap: 14px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-agent">
    <img class="header-photo" src="/profile.jpg" onerror="this.outerHTML='<div class=\'header-photo-placeholder\'>T</div>'" alt="Tim">
    <div>
      <div class="brand">TIM<span>THLD</span></div>
      <div class="brand-sub">Real Estate Agent · Bangkok</div>
    </div>
  </div>
</div>

<div id="root">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script>
let photos = [], idx = 0;

(async () => {
  const token = location.pathname.split('/listing/')[1];
  if (!token) { renderError('Invalid link'); return; }

  let prop;
  try {
    const r = await fetch(`/api/listing/${token}`);
    if (!r.ok) throw new Error('Not found');
    prop = await r.json();
  } catch {
    renderError('This listing is no longer available.');
    return;
  }

  render(prop);
})();

function render(p) {
  photos = Array.isArray(p.cached_photos) ? p.cached_photos : [];
  idx = 0;

  const statusMap = {
    'Disponible': ['Available','available'],
    'Proposé':    ['Proposed','proposed'],
    'Loué':       ['Rented','rented']
  };
  const [label, cls] = statusMap[p.status] || [p.status, 'available'];

  // Check if profile photo exists
  const profileImg = new Image();
  profileImg.src = '/profile.jpg';
  const agentHTML = `
    <div class="agent-card">
      <img class="agent-photo" src="/profile.jpg" onerror="this.outerHTML='<div class=\\'agent-photo-placeholder\\'>T</div>'" alt="Tim">
      <div class="agent-info">
        <div class="agent-name">Tim THLD</div>
        <div class="agent-title">Real Estate Agent · Bangkok</div>
      </div>
    </div>`;

  document.getElementById('root').innerHTML = `
    <div class="carousel-section">
      <div class="carousel-track" id="car-track">
        ${carHTML()}
      </div>
      ${photos.length > 1 ? `<div class="car-thumbs" id="thumbs">${thumbsHTML()}</div>` : ''}
    </div>

    <div class="content">
      <span class="status-badge status-${cls}">● ${label}</span>
      <div class="prop-title">${esc(p.title)}</div>
      ${p.price ? `<div class="prop-price">${Number(p.price).toLocaleString('fr-FR')} ฿ / month</div>` : ''}

      <div class="divider"></div>

      <div class="details-grid">
        ${p.zone      ? detail('📍 Location', p.zone) : ''}
        ${p.room_type ? detail('🛏 Type', p.room_type + (p.sqm ? ' · ' + p.sqm : '')) : ''}
        ${p.floor     ? detail('🏢 Floor', p.floor) : ''}
        ${p.room_no   ? detail('🔑 Unit', p.room_no) : ''}
      </div>

      ${p.description ? `<div class="description">${esc(p.description)}</div>` : ''}

    </div>

    <div class="cta-bar">
      <div class="cta-inner">
        <a class="btn-whatsapp"
          href="https://wa.me/66646492968?text=${encodeURIComponent('Hi Tim! I\'m interested in ' + p.title + (p.price ? ' (' + Number(p.price).toLocaleString('fr-FR') + ' ฿/mo)' : ''))}"
          target="_blank">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Contact Tim
        </a>
      </div>
    </div>`;

  if (photos.length > 1) preload(1);
}

function carHTML() {
  if (!photos.length) return '<div class="no-photo">🏠</div>';
  return `
    <img src="${photos[idx].thumbnail}" onerror="this.style.opacity='0.2'" alt="">
    <button class="car-btn car-prev" onclick="nav(-1)">‹</button>
    <button class="car-btn car-next" onclick="nav(1)">›</button>
    <span class="car-count">${idx + 1} / ${photos.length}</span>`;
}

function thumbsHTML() {
  return photos.map((p, i) =>
    `<div class="thumb ${i === idx ? 'active' : ''}" onclick="goTo(${i})">
      <img src="${p.thumbnail}" alt="">
    </div>`
  ).join('');
}

function nav(dir) {
  idx = (idx + dir + photos.length) % photos.length;
  update();
  preload(dir);
}

function goTo(i) {
  idx = i;
  update();
}

function update() {
  const track = document.getElementById('car-track');
  if (track) track.innerHTML = carHTML();
  const thumbs = document.getElementById('thumbs');
  if (thumbs) thumbs.innerHTML = thumbsHTML();
}

function preload(dir) {
  if (photos.length < 2) return;
  const next = (idx + dir + photos.length) % photos.length;
  const img = new Image(); img.src = photos[next].thumbnail;
}

function detail(label, value) {
  return `<div class="detail-item">
    <span class="detail-label">${label}</span>
    <span class="detail-value">${esc(String(value))}</span>
  </div>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderError(msg) {
  document.getElementById('root').innerHTML =
    `<div class="error-state"><span style="font-size:48px">🏚</span><p>${msg}</p></div>`;
}
</script>
</body>
</html>
